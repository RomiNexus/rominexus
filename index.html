<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romi Nexus | Strategic Trade Desk</title>
    <style>
        :root {
            --bg-dark: #000000;
            --panel-bg: rgba(28, 28, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gold-light: #F5D061;
            --white: #F5F5F7;
            --text-muted: #86868B;
            --pos: #34C759;
            --neg: #FF3B30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.47059;
            letter-spacing: -0.022em;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* CONTINUOUS ROTATING TICKER */
        .ticker-wrap {
            background: #1D1D1F;
            border-bottom: 1px solid #333;
            width: 100%;
            overflow: hidden;
            padding: 10px 0;
            white-space: nowrap;
        }

        .ticker-text {
            display: inline-block;
            color: var(--gold-light);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* MAIN CONTAINER FOR THE FORM */
        .main-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px;
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .header-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-text h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--white);
        }

        .header-text p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker-text">
            SYSTEM ACTIVE &nbsp;&nbsp;|&nbsp;&nbsp; ROMI NEXUS STRATEGIC TRADE DESK &nbsp;&nbsp;|&nbsp;&nbsp; GLOBAL DUE DILIGENCE PORTAL
        </div>
    </div>

    <div class="main-container">
        <div class="header-text">
            <h1>Global Due Diligence</h1>
            <p>Please complete the intake form below to begin the assessment process.</p>
        </div>

        <iframe data-tally-src="https://tally.so/embed/VL0dYN?transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="200" frameborder="0" marginheight="0" marginwidth="0" title="Global Due Diligence Portal"></iframe>
        <script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
        </div>

</body>
</html>
